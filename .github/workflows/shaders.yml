name: Shaders

on:
  push:
    branches: [ main ]
    paths:
      - 'shaders/**'
      - 'vendor/shade-mcp/**'
      - 'scripts/**'
      - 'demo/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/shaders.yml'
    tags:
      - 'shaders-v*'
  pull_request:
    branches: [ main ]
    paths:
      - 'shaders/**'
      - 'vendor/shade-mcp/**'
      - 'scripts/**'
      - 'demo/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/shaders.yml'

jobs:
  test:
    name: Shader tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install --include=dev

    - name: Run DSL language tests
      run: npm run test:shaders:lang

    - name: Install Playwright browsers
      run: npx playwright install chromium

    - name: Run shader compile and render test
      run: npm run test:shaders:render:webgl2

    - name: Run shader structure tests
      run: npm run test:shaders:structure

  bundle:
    name: Bundle shaders
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install --include=dev

    - name: Build shader bundles
      run: npm run bundle:shaders

    - name: Package shader bundle
      run: |
        mkdir -p dist/release
        tar -C dist -czf dist/release/noisemaker-shaders.tar.gz shaders/ effects/

    - name: Upload shader bundle artifact
      uses: actions/upload-artifact@v7
      with:
        name: noisemaker-shaders
        path: dist/release/noisemaker-shaders.tar.gz
        retention-days: 7

  deploy-site:
    name: Deploy site (shaders)
    runs-on: ubuntu-latest
    needs: bundle
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install --include=dev

    - name: Build site bundle
      run: npm run bundle:site

    - name: Set up SSH
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        echo "${{ secrets.SCAFFOLD_SSH_KEY }}" | base64 -d > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan ${{ secrets.SCAFFOLD_SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

    - name: Deploy to scaffold
      run: |
        rsync -avz --delete \
          dist/site/ \
          deploy@${{ secrets.SCAFFOLD_SERVER_IP }}:~/sites/noisemaker.app/content/

  deploy-shaders:
    name: Dispatch scaffold library-release
    runs-on: ubuntu-latest
    needs: bundle
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    # Under the tag-on-commit scheme, scaffold is the sole authority
    # for shader library releases: it builds, computes next patch,
    # deploys to the CDN origin, updates the rolling MAJOR.MINOR
    # symlink, creates the git tag, and purges the CDN. This job just
    # fires the workflow_dispatch. See scaffold/platform/README.md
    # "Tag-on-commit mechanism" for the full contract.

    steps:
    - name: Mint scaffold GitHub App token
      id: app-token
      uses: actions/create-github-app-token@v3
      with:
        app-id: 2959521
        private-key: ${{ secrets.EHSRE_APP_PRIVATE_KEY }}
        owner: noisefactorllc
        repositories: scaffold

    - name: Dispatch scaffold library-release for noisemaker
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        gh workflow run library-release.yml \
          --repo noisefactorllc/scaffold \
          --ref main \
          -f library=noisemaker \
          -f sha=${{ github.sha }}
        echo "Dispatched scaffold library-release for noisemaker @ ${{ github.sha }}"
