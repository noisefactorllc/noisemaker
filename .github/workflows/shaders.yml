name: Shaders

on:
  push:
    branches: [ main ]
    paths:
      - 'shaders/**'
      - 'vendor/shade-mcp/**'
      - 'scripts/**'
      - 'demo/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/shaders.yml'
    tags:
      - 'shaders-v*'
  pull_request:
    branches: [ main ]
    paths:
      - 'shaders/**'
      - 'vendor/shade-mcp/**'
      - 'scripts/**'
      - 'demo/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/shaders.yml'

jobs:
  test:
    name: Shader tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install --include=dev

    - name: Run DSL language tests
      run: npm run test:shaders:lang

    - name: Install Playwright browsers
      run: npx playwright install chromium

    - name: Run shader compile and render test
      run: npm run test:shaders:render:webgl2

    - name: Run shader structure tests
      run: npm run test:shaders:structure

  bundle:
    name: Bundle shaders
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install --include=dev

    - name: Build shader bundles
      run: npm run bundle:shaders

    - name: Package shader bundle
      run: |
        mkdir -p dist/release
        tar -C dist -czf dist/release/noisemaker-shaders.tar.gz shaders/ effects/

    - name: Upload shader bundle artifact
      uses: actions/upload-artifact@v4
      with:
        name: noisemaker-shaders
        path: dist/release/noisemaker-shaders.tar.gz
        retention-days: 7

  deploy-site:
    name: Deploy site (shaders)
    runs-on: ubuntu-latest
    needs: bundle
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install --include=dev

    - name: Build site bundle
      run: npm run bundle:site

    - name: Set up SSH
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        echo "${{ secrets.SCAFFOLD_SSH_KEY }}" | base64 -d > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan ${{ secrets.SCAFFOLD_SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

    - name: Deploy to scaffold
      run: |
        rsync -avz --delete \
          dist/site/ \
          deploy@${{ secrets.SCAFFOLD_SERVER_IP }}:~/sites/noisemaker.app/content/

  deploy-cdn:
    name: Deploy to CDN
    runs-on: ubuntu-latest
    needs: bundle
    if: github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install --include=dev

    - name: Build shader bundles
      run: npm run bundle:shaders

    - name: Resolve project version
      id: version
      run: |
        VERSION=$(node -e "const fs=require('fs'); const match=fs.readFileSync('pyproject.toml','utf8').match(/^version\s*=\s*\"([^\"]+)\"/m); if(!match){process.exit(1);} console.log(match[1]);")
        MAJOR=$(echo "$VERSION" | cut -d. -f1)
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "major=$MAJOR" >> "$GITHUB_OUTPUT"

    - name: Check deploy eligibility
      id: check
      run: |
        # Pre-1.0: deploy on every push to main (mutable CDN paths)
        # Post-1.0: deploy only on tagged releases (immutable CDN paths)
        MAJOR=${{ steps.version.outputs.major }}
        if [ "$MAJOR" = "0" ]; then
          echo "deploy=true" >> "$GITHUB_OUTPUT"
          echo "cache=public, max-age=300" >> "$GITHUB_OUTPUT"
        elif [[ "$GITHUB_REF" == refs/tags/shaders-v* ]]; then
          echo "deploy=true" >> "$GITHUB_OUTPUT"
          echo "cache=public, max-age=31536000, immutable" >> "$GITHUB_OUTPUT"
        else
          echo "deploy=false" >> "$GITHUB_OUTPUT"
          echo "Skipping CDN deploy: post-1.0 requires a shaders-v* tag"
        fi

    - name: Configure AWS credentials
      if: steps.check.outputs.deploy == 'true'
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Sync shaders to S3
      if: steps.check.outputs.deploy == 'true'
      run: |
        VERSION=${{ steps.version.outputs.version }}
        aws s3 sync dist/shaders/ "s3://noisedeck-shaders/${VERSION}/" \
          --cache-control "${{ steps.check.outputs.cache }}"
        aws s3 sync dist/effects/ "s3://noisedeck-shaders/${VERSION}/effects/" \
          --cache-control "${{ steps.check.outputs.cache }}"

    - name: Invalidate CloudFront
      if: steps.check.outputs.deploy == 'true'
      run: |
        VERSION=${{ steps.version.outputs.version }}
        aws cloudfront create-invalidation \
          --distribution-id ${{ secrets.SHADERS_CF_DISTRIBUTION_ID }} \
          --paths "/${VERSION}/*"
