name: Shaders

on:
  push:
    branches: [ main ]
    paths:
      - 'shaders/**'
      - 'vendor/shade-mcp/**'
      - 'scripts/**'
      - 'demo/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/shaders.yml'
    tags:
      - 'shaders-v*'
  pull_request:
    branches: [ main ]
    paths:
      - 'shaders/**'
      - 'vendor/shade-mcp/**'
      - 'scripts/**'
      - 'demo/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/shaders.yml'

jobs:
  test:
    name: Shader tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install --include=dev

    - name: Run DSL language tests
      run: npm run test:shaders:lang

    - name: Install Playwright browsers
      run: npx playwright install chromium

    - name: Run shader compile and render test
      run: npm run test:shaders:render:webgl2

    - name: Run shader structure tests
      run: npm run test:shaders:structure

  bundle:
    name: Bundle shaders
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install --include=dev

    - name: Build shader bundles
      run: npm run bundle:shaders

    - name: Package shader bundle
      run: |
        mkdir -p dist/release
        tar -C dist -czf dist/release/noisemaker-shaders.tar.gz shaders/ effects/

    - name: Upload shader bundle artifact
      uses: actions/upload-artifact@v4
      with:
        name: noisemaker-shaders
        path: dist/release/noisemaker-shaders.tar.gz
        retention-days: 7

  deploy-site:
    name: Deploy site (shaders)
    runs-on: ubuntu-latest
    needs: bundle
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install --include=dev

    - name: Build site bundle
      run: npm run bundle:site

    - name: Set up SSH
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        echo "${{ secrets.SCAFFOLD_SSH_KEY }}" | base64 -d > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan ${{ secrets.SCAFFOLD_SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

    - name: Deploy to scaffold
      run: |
        rsync -avz --delete \
          dist/site/ \
          deploy@${{ secrets.SCAFFOLD_SERVER_IP }}:~/sites/noisemaker.app/content/

  deploy-shaders:
    name: Deploy shaders to scaffold
    runs-on: ubuntu-latest
    needs: bundle
    if: github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install --include=dev

    - name: Build shader bundles
      run: npm run bundle:shaders

    - name: Resolve project version
      id: version
      run: |
        VERSION=$(node -e "const fs=require('fs'); const match=fs.readFileSync('pyproject.toml','utf8').match(/^version\s*=\s*\"([^\"]+)\"/m); if(!match){process.exit(1);} console.log(match[1].replace(/\.dev\d+$/, ''));")
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Set up SSH
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        echo "${{ secrets.SCAFFOLD_SSH_KEY }}" | base64 -d > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan ${{ secrets.SCAFFOLD_SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

    - name: Deploy shaders to scaffold
      run: |
        VERSION=${{ steps.version.outputs.version }}
        rsync -avz \
          dist/shaders/ \
          deploy@${{ secrets.SCAFFOLD_SERVER_IP }}:~/sites/shaders.noisedeck.app/content/${VERSION}/
        rsync -avz \
          dist/effects/ \
          deploy@${{ secrets.SCAFFOLD_SERVER_IP }}:~/sites/shaders.noisedeck.app/content/${VERSION}/effects/

    - name: Purge CDN cache
      run: |
        VERSION=${{ steps.version.outputs.version }}
        DOMAIN="shaders.noisedeck.app"
        EDGES="deploy@172.233.144.193 root@172.104.31.65 root@139.162.153.16 root@172.239.236.121 root@172.104.181.86 root@172.233.0.212 root@172.105.161.140"
        for ip in 172.233.144.193 172.104.31.65 139.162.153.16 172.239.236.121 172.104.181.86 172.233.0.212 172.105.161.140; do
          ssh-keyscan $ip >> ~/.ssh/known_hosts 2>/dev/null
        done
        FILES=""
        for f in "/${VERSION}/noisemaker-shaders-core.esm.js" "/${VERSION}/noisemaker-shaders-core.esm.min.js" "/${VERSION}/noisemaker-shaders-core.min.js" "/${VERSION}/effects/manifest.json"; do
          KEY="${DOMAIN}${f}"
          HASH=$(echo -n "$KEY" | md5sum | cut -d' ' -f1)
          L1="${HASH: -1}"
          L2="${HASH: -3:2}"
          FILES="$FILES /var/cache/nginx/cdn/${L1}/${L2}/${HASH}"
        done
        CHANGED=$(git diff-tree --no-commit-id --name-only -r HEAD)
        while IFS= read -r f; do
          case "$f" in
            shaders/*|effects/*)
              CDN_PATH="/${VERSION}/${f}"
              KEY="${DOMAIN}${CDN_PATH}"
              HASH=$(echo -n "$KEY" | md5sum | cut -d' ' -f1)
              L1="${HASH: -1}"
              L2="${HASH: -3:2}"
              FILES="$FILES /var/cache/nginx/cdn/${L1}/${L2}/${HASH}"
              ;;
          esac
        done <<< "$CHANGED"
        for edge in $EDGES; do
          count=$(ssh -o ConnectTimeout=5 -o StrictHostKeyChecking=accept-new "$edge" \
            "docker exec nf-cdn-cache sh -c 'count=0; for f in $FILES; do [ -f \"\$f\" ] && rm -f \"\$f\" && count=\$((count+1)); done; echo \$count'" 2>/dev/null || echo "ERR")
          echo "  ${edge##*@}: purged $count files"
        done
