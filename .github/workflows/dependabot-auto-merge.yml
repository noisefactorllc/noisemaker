name: Dependabot auto-merge

# Fires AFTER any CI workflow completes. Auto-merges Dependabot PRs ONLY if
# ALL THREE gates pass:
#   1. All check_runs for the head SHA passed (no required-status-checks
#      branch protection on these repos, so gh pr merge --auto can't gate
#      on its own).
#   2. Clean rebase: PR base SHA == current main HEAD. After each merge,
#      main moves, so every other open Dependabot PR must rebase before
#      it can also merge — that re-runs CI against the new main and
#      catches conflicts a stale base would miss.
#   3. Bump level is patch or minor. Majors stay open for human review
#      (cf. express 4 → 5 outage 2026-05-13, stripe 14 → 15 silent break).
#
# Classification:
#   - Grouped PRs (our dependabot.yml splits patches/minor/major):
#       *"-patches group"*     → patch
#       *"-minor group"*       → minor
#       *"-major group"*       → major (human review)
#       *"-minor-major group"* → mixed/legacy (human review)
#   - Single-package PRs: parse version pair from title. Supports both:
#       "bump X from A.B.C to D.E.F"
#       "update X requirement from <Y to >=Z" (range-pinned deps)

on:
  workflow_run:
    workflows:
      - ci
      - JavaScript
      - Python
      - Test
      - Build
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Evaluate PR
        id: eval
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -e
          PR_DATA=$(gh api "repos/$REPO/commits/$HEAD_SHA/pulls" --jq '.[0] // empty')
          if [ -z "$PR_DATA" ]; then echo "No PR for $HEAD_SHA"; exit 0; fi

          PR_NUM=$(echo "$PR_DATA" | jq -r '.number')
          PR_USER=$(echo "$PR_DATA" | jq -r '.user.login')
          if [ "$PR_USER" != "dependabot[bot]" ]; then
            echo "PR #$PR_NUM by $PR_USER — not Dependabot, skipping"
            exit 0
          fi

          # Gate 1: every check_run for this SHA passed
          CHECKS=$(gh api "repos/$REPO/commits/$HEAD_SHA/check-runs?per_page=100" --jq '.check_runs')
          PENDING=$(echo "$CHECKS" | jq '[.[] | select(.status != "completed")] | length')
          FAILED=$(echo "$CHECKS" | jq '[.[] | select(.conclusion=="failure" or .conclusion=="cancelled" or .conclusion=="timed_out")] | length')

          if [ "$PENDING" -gt 0 ]; then
            echo "$PENDING check(s) pending — wait for next workflow_run"
            exit 0
          fi
          if [ "$FAILED" -gt 0 ]; then
            echo "$FAILED check(s) failed — NOT auto-merging PR #$PR_NUM"
            exit 0
          fi

          # Gate 2: clean rebase — PR base must match current main HEAD.
          # If main has moved since this PR was last rebased, ask Dependabot
          # to rebase. The next workflow_run after rebase will re-check.
          BASE_REF=$(echo "$PR_DATA" | jq -r '.base.ref')
          BASE_SHA=$(echo "$PR_DATA" | jq -r '.base.sha')
          MAIN_SHA=$(gh api "repos/$REPO/commits/$BASE_REF" --jq '.sha')
          if [ "$BASE_SHA" != "$MAIN_SHA" ]; then
            echo "PR #$PR_NUM base ($BASE_SHA) != $BASE_REF HEAD ($MAIN_SHA) — requesting rebase"
            gh pr comment "$PR_NUM" -R "$REPO" --body "@dependabot rebase" || true
            exit 0
          fi

          # Gate 3: classify the bump into patch / minor / major
          TITLE=$(echo "$PR_DATA" | jq -r '.title // ""')
          LEVEL=""

          # Grouped — order matters: check -minor-major before -major
          if echo "$TITLE" | grep -qE 'bump the [a-z-]+-patches group'; then
            LEVEL="patch"
          elif echo "$TITLE" | grep -qE 'bump the [a-z-]+-minor-major group'; then
            LEVEL="mixed"
          elif echo "$TITLE" | grep -qE 'bump the [a-z-]+-minor group'; then
            LEVEL="minor"
          elif echo "$TITLE" | grep -qE 'bump the [a-z-]+-major group'; then
            LEVEL="major"
          else
            # Single-package — try both title formats
            # Format A: "bump X from A.B.C to D.E.F"
            FROM=$(echo "$TITLE" | grep -oE 'from [0-9]+(\.[0-9]+)+' | head -1 | sed 's/^from //')
            TO=$(echo "$TITLE"   | grep -oE 'to [0-9]+(\.[0-9]+)+'   | head -1 | sed 's/^to //')
            # Format B: "update X requirement from <Y to >=Z,<W"
            if [ -z "$FROM" ] || [ -z "$TO" ]; then
              VERSIONS=$(echo "$TITLE" | grep -oE '>=[0-9]+(\.[0-9]+)+' | sed 's/^>=//')
              FROM=$(echo "$VERSIONS" | sed -n '1p')
              TO=$(echo "$VERSIONS"   | sed -n '2p')
            fi
            if [ -n "$FROM" ] && [ -n "$TO" ]; then
              fm=$(echo "$FROM" | cut -d. -f1); tm=$(echo "$TO" | cut -d. -f1)
              fn=$(echo "$FROM" | cut -d. -f2); tn=$(echo "$TO" | cut -d. -f2)
              if [ "$fm" != "$tm" ]; then
                LEVEL="major"
              elif [ "$fn" != "$tn" ]; then
                LEVEL="minor"
              else
                LEVEL="patch"
              fi
            fi
          fi

          if [ -z "$LEVEL" ]; then
            echo "Could not classify PR title — leaving open for review: $TITLE"
            exit 0
          fi

          case "$LEVEL" in
            patch|minor)
              echo "$LEVEL bump, CI green, base clean — merging PR #$PR_NUM ($TITLE)"
              echo "pr_num=$PR_NUM" >> "$GITHUB_OUTPUT"
              ;;
            major)
              echo "PR #$PR_NUM is a major bump — NOT auto-merging"
              gh pr comment "$PR_NUM" -R "$REPO" --body "Auto-merge skipped: major version bump. Major bumps need a human to review and merge (cf. express 4 → 5 outage 2026-05-13)." || true
              ;;
            mixed)
              echo "PR #$PR_NUM is a legacy mixed minor-major group — NOT auto-merging"
              gh pr comment "$PR_NUM" -R "$REPO" --body "Auto-merge skipped: legacy minor-major mixed group (minors and majors are now separate groups). Recreate this PR after the next Dependabot schedule, or merge manually if every bump in it is minor or lower." || true
              ;;
          esac

      - name: Approve
        if: steps.eval.outputs.pr_num != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr review --approve "${{ steps.eval.outputs.pr_num }}" -R "${{ github.repository }}" || true

      - name: Merge
        if: steps.eval.outputs.pr_num != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --squash --delete-branch "${{ steps.eval.outputs.pr_num }}" -R "${{ github.repository }}"
