name: Release Shaders

on:
  push:
    tags: ['v*']

jobs:
  release-shaders:
    name: Build and publish shader bundles
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install --include=dev

    - name: Build shader bundles
      run: npm run bundle:shaders

    - name: Package tarball
      run: |
        tar -czf noisemaker-shaders.tar.gz \
          -C dist/shaders \
            noisemaker-shaders-core.esm.js \
            noisemaker-shaders-core.esm.min.js \
            noisemaker-shaders-core.min.js \
          -C ../../dist \
            effects

    - name: Create release
      env:
        GH_TOKEN: ${{ github.token }}
        TAG: ${{ github.ref_name }}
      run: |
        gh release create "$TAG" \
          --title "Noisemaker $TAG" \
          --generate-notes \
          noisemaker-shaders.tar.gz
