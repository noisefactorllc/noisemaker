name: Docs site

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/docs-site.yml'
      - '.readthedocs.yaml'
      - 'docs/**'
      - 'noisemaker/**'
      - 'pyproject.toml'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/bundle.js'
      - 'scripts/bundle-shaders.js'
      - 'scripts/bundle-effects.js'
      - 'shaders/**'

jobs:
  deploy-docs:
    name: Deploy docs
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install Python docs dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r docs/sphinx-requirements.txt
        python -m pip install -e . --no-deps

    - name: Install Node dependencies
      run: npm install --include=dev

    - name: Build Noisemaker bundles for docs
      run: |
        npm run bundle
        cp dist/noisemaker.min.js docs/_static/
        npm run bundle:shaders -- --minify-shaders
        cp dist/shaders/noisemaker-shaders-core.min.js docs/_static/
        cp -r dist/effects docs/_static/
        cp shaders/effects/manifest.json docs/_static/effects/

    - name: Build Sphinx HTML
      run: sphinx-build -b dirhtml docs docs/_build/html

    - name: Generate deployment metadata
      run: |
        DEPLOY_DATE=$(date -u +"%s")
        printf '{\n  "git_hash": "%s",\n  "date": %s\n}\n' "$GITHUB_SHA" "$DEPLOY_DATE" \
          > docs/_build/html/deployment-meta.json
        cat docs/_build/html/deployment-meta.json

    - name: Set up SSH
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        echo "${{ secrets.SCAFFOLD_SSH_KEY }}" | base64 -d > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan ${{ secrets.SCAFFOLD_SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

    - name: Deploy to scaffold
      run: |
        ssh deploy@${{ secrets.SCAFFOLD_SERVER_IP }} "mkdir -p ~/sites/docs.noisemaker.app/content"
        rsync -avz --delete \
          docs/_build/html/ \
          deploy@${{ secrets.SCAFFOLD_SERVER_IP }}:~/sites/docs.noisemaker.app/content/

    - name: Verify deployment
      run: |
        for try in $(seq 1 12); do
          body=$(curl -sf --max-time 10 "https://docs.noisemaker.app/deployment-meta.json" || true)
          case "$body" in
            *"$GITHUB_SHA"*)
              echo "OK: https://docs.noisemaker.app/deployment-meta.json reports $GITHUB_SHA (try $try)"
              exit 0
              ;;
          esac
          sleep 5
        done
        echo "::error::deployment-meta.json on https://docs.noisemaker.app did not report $GITHUB_SHA after ~60s"
        exit 1
