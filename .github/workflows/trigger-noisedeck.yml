# Trigger downstream repos to pull latest noisemaker changes
name: Trigger Downstream Updates

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'demo/shaders/**'
      - 'shaders/**'
  workflow_dispatch:  # Allow manual triggering

jobs:
  trigger-downstream:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.NOISEDECK_APP_ID }}
          private-key: ${{ secrets.NOISEDECK_APP_PRIVATE_KEY }}
          owner: noisedeck

      - name: Trigger noisedeck
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: noisedeck/noisedeck
          event-type: noisemaker-updated
          client-payload: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}"}'

      - name: Trigger shade
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: noisedeck/shade
          event-type: noisemaker-updated
          client-payload: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}"}'

      - name: Trigger sharing
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: noisedeck/sharing
          event-type: noisemaker-updated
          client-payload: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}"}'

      - name: Trigger polymorphic
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: noisedeck/polymorphic
          event-type: noisemaker-updated
          client-payload: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}"}'

      - name: Trigger foundry
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: noisedeck/foundry
          event-type: noisemaker-updated
          client-payload: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}"}'
