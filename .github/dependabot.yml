version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Denver"
    groups:
      npm-patches:
        patterns:
          - "*"
        update-types:
          - "patch"
      npm-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
      npm-major:
        patterns:
          - "*"
        update-types:
          - "major"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(npm)"
    labels:
      - "dependencies"
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Denver"
    groups:
      pip-patches:
        patterns:
          - "*"
        update-types:
          - "patch"
      pip-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
      pip-major:
        patterns:
          - "*"
        update-types:
          - "major"
    ignore:
      # tensorflow 2.21 (latest) requires h5py<3.15; unpin when tensorflow
      # supports h5py 3.15+.
      - dependency-name: "h5py"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(pip)"
    labels:
      - "dependencies"
