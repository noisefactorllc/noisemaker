<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noisemaker Shaders Demo</title>
    <link rel="stylesheet" href="../common.css" />
    <link rel="stylesheet" href="colors.css" />
    <link rel="stylesheet" href="layout.css" />
    <script type="importmap">
    {
        "imports": {
            "noisemaker/shader-effects": "../../shaders/src/runtime/effect.js"
        }
    }
    </script>
</head>
<body class="fixed-canvas-mode">
    <div id="loading" class="loading">loading effects...</div>
    <div id="app-container" style="display: none;">
        <div id="left-panel">
            <div class="shader-module" id="pipeline-module">
                <div class="module-title">
                    <span class="module-title-text">Noisemaker Shaders Demo</span>
                    <span style="flex: 1;"></span>
                    <button id="pause-play-btn" class="action-btn tooltip" data-title="Pause/play animation" aria-label="Pause/play animation">pause</button>
                    <button id="pipeline-code-btn" class="action-btn tooltip" data-title="Edit DSL program" aria-label="Edit DSL program">code</button>
                </div>
                <div class="module-content" style="display: flex; flex-direction: column; gap: 0.75rem;">
                    <div class="control-group" style="margin-bottom: 0;">
                        <div class="control-header">
                            <label for="effect-select" class="control-label">effect</label>
                        </div>
                        <effect-select id="effect-select"></effect-select>
                    </div>

                    <div style="display: flex; flex-direction: row; gap: 1.5rem; align-items: center; flex-wrap: wrap;">
                        <label class="radio-option" style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; color: var(--color6);">
                            <input type="radio" name="backend" value="glsl" checked>
                            <span>glsl</span>
                        </label>
                        <label class="radio-option" style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; color: var(--color6);">
                            <input type="radio" name="backend" value="wgsl">
                            <span>wgsl</span>
                        </label>
                        <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; color: var(--color6);">
                            <span>duration</span>
                            <input type="number" id="duration-input" value="10" min="1" max="60" step="1" style="width: 4rem; padding: 0.25rem 0.375rem; background: color-mix(in srgb, var(--accent3) 15%, transparent 85%); border: 1px solid color-mix(in srgb, var(--accent3) 25%, transparent 75%); border-radius: var(--ui-corner-radius-small); color: var(--color6); font-family: Nunito, sans-serif; font-size: 0.6875rem; font-weight: 560; outline: none; -moz-appearance: textfield;">
                        </label>
                        <span id="fps-counter" style="font-size: 0.75rem; color: var(--color5); font-variant-numeric: tabular-nums; min-width: 5ch;">-- fps</span>
                    </div>

                    <!-- DSL Editor Section (hidden by default) -->
                    <div id="dsl-editor-section" style="display: none;">
                        <textarea id="dsl-editor" spellcheck="false" style="margin: 0; padding: 0.5rem; width: 100%; min-height: 120px; resize: vertical; background: color-mix(in srgb, var(--color1) 85%, transparent 15%); border: 1px solid color-mix(in srgb, var(--accent3) 50%, transparent 50%); border-radius: var(--ui-corner-radius-small); font-family: ui-monospace, 'Cascadia Mono', 'Consolas', monospace; font-size: 0.6875rem; line-height: 1.4; color: var(--color5); box-sizing: border-box;"></textarea>
                        <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
                            <button id="dsl-run-btn" style="flex: 1; padding: 0.375rem 0.75rem; background: color-mix(in srgb, var(--accent3) 70%, transparent 30%); border: 1px solid color-mix(in srgb, var(--accent3) 75%, transparent 25%); border-radius: var(--ui-corner-radius-small); color: var(--color6); font-family: Nunito, sans-serif; font-size: 0.6875rem; font-weight: 600; cursor: pointer; transition: all 0.15s ease;">run</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="effect-controls-container">
                <!-- Dynamic effect controls will be inserted here -->
            </div>
        </div>

        <div id="canvas-container">
            <canvas id="canvas"></canvas>
        </div>
    </div>

    <dialog id="loading-dialog">
        <h3 id="loading-dialog-title">loading effect...</h3>
        <div id="loading-dialog-status" class="loading-status">preparing...</div>
        <div id="loading-dialog-queue" class="loading-queue"></div>
        <div class="loading-progress">
            <div id="loading-dialog-progress" class="loading-progress-bar"></div>
        </div>
    </dialog>

    <div id="status" class="status" style="display: none;"></div>

    <script type="module">
        // =====================================================================
        // Noisemaker Shader Demo - Wired with CanvasRenderer + UIController
        // =====================================================================
        
        // Check for bundles mode BEFORE importing
        const params = new URLSearchParams(window.location.search);
        const useBundles = params.get('bundles') === '1' || params.get('bundles') === 'true';
        
        // Dynamic imports based on bundles mode
        const corePath = useBundles 
            ? '../../dist/shaders/noisemaker-shaders-core.esm.min.js'
            : '../../shaders/src/renderer/canvas.js';
        const demoUiPath = useBundles
            ? '../../dist/shaders/noisemaker-shaders-core.esm.min.js'
            : './lib/demo-ui.js';
        const effectSelectPath = useBundles
            ? '../../dist/shaders/noisemaker-shaders-core.esm.min.js'
            : './lib/effect-select.js';
        const toggleSwitchPath = useBundles
            ? '../../dist/shaders/noisemaker-shaders-core.esm.min.js'
            : './lib/toggle-switch.js';
        
        const [coreModule, demoUiModule, effectSelectModule, toggleSwitchModule] = await Promise.all([
            import(corePath),
            import(demoUiPath),
            import(effectSelectPath),
            import(toggleSwitchPath)
        ]);
        
        const { CanvasRenderer, getEffect } = coreModule;
        const { EffectSelect } = effectSelectModule;
        const { ToggleSwitch } = toggleSwitchModule;
        const { 
            UIController, 
            extractEffectNamesFromDsl,
            getBackendFromURL,
            getUseBundlesFromURL,
            getEffectFromURL
        } = demoUiModule;

        // =====================================================================
        // DOM Elements
        // =====================================================================
        
        const loadingEl = document.getElementById('loading');
        const appEl = document.getElementById('app-container');
        const statusEl = document.getElementById('status');
        const effectSelect = document.getElementById('effect-select');
        const effectControlsContainer = document.getElementById('effect-controls-container');
        const dslEditor = document.getElementById('dsl-editor');
        const dslRunBtn = document.getElementById('dsl-run-btn');
        const canvasContainer = document.getElementById('canvas-container');
        const loadingDialog = document.getElementById('loading-dialog');
        const loadingDialogTitle = document.getElementById('loading-dialog-title');
        const loadingDialogStatus = document.getElementById('loading-dialog-status');
        const loadingDialogQueue = document.getElementById('loading-dialog-queue');
        const loadingDialogProgress = document.getElementById('loading-dialog-progress');
        const fpsCounterEl = document.getElementById('fps-counter');
        let canvas = document.getElementById('canvas');

        // =====================================================================
        // Create Renderer and UI instances
        // =====================================================================
        
        // Compute absolute basePath for shader assets
        // When using bundles, point at dist/shaders for core and dist/effects for effect bundles
        const shaderBasePath = useBundles
            ? new URL('../../dist/shaders', import.meta.url).href
            : new URL('../../shaders', import.meta.url).href;
        const bundleBasePath = new URL('../../dist/effects', import.meta.url).href;
        
        /**
         * Compute optimal canvas size based on container dimensions.
         * Returns square dimensions that fit within the available space.
         * Falls back to 1024 if container dimensions are unavailable.
         */
        function computeCanvasSize() {
            // Get container dimensions (minus padding)
            const containerStyle = getComputedStyle(canvasContainer);
            const paddingX = parseFloat(containerStyle.paddingLeft) + parseFloat(containerStyle.paddingRight);
            const paddingY = parseFloat(containerStyle.paddingTop) + parseFloat(containerStyle.paddingBottom);
            const availableWidth = canvasContainer.clientWidth - paddingX;
            const availableHeight = canvasContainer.clientHeight - paddingY;
            
            // Ensure we have valid dimensions (fallback to 1024 if container not laid out)
            if (availableWidth <= 0 || availableHeight <= 0) {
                return 1024;
            }
            
            // Use the smaller dimension for a square canvas, capped at 2048, minimum 64
            const size = Math.max(64, Math.min(availableWidth, availableHeight, 2048));
            
            // Round to nearest pixel for clean rendering
            return Math.floor(size);
        }
        
        // Initialize with computed size
        const initialSize = computeCanvasSize() || 1024;
        
        // Set initial canvas size
        canvas.width = initialSize;
        canvas.height = initialSize;

        const renderer = new CanvasRenderer({
            canvas: canvas,
            canvasContainer: canvasContainer,
            width: initialSize,
            height: initialSize,
            basePath: shaderBasePath,
            preferWebGPU: false,
            useBundles: useBundles,
            bundlePath: bundleBasePath,
            onFPS: (fps) => {
                if (fpsCounterEl) {
                    fpsCounterEl.textContent = `${fps} fps`;
                }
            },
            onError: (err) => {
                console.error('Renderer error:', err);
            }
        });
        
        if (useBundles) {
            console.log('[Demo] Using pre-built effect bundles from:', bundleBasePath);
        }

        /**
         * Handle window/container resize by updating canvas dimensions.
         * The CanvasRenderer will automatically detect the dimension change
         * and update the pipeline accordingly.
         */
        function handleResize() {
            const newSize = computeCanvasSize();
            if (newSize && (canvas.width !== newSize || canvas.height !== newSize)) {
                // Setting canvas dimensions triggers the CanvasRenderer's observer
                canvas.width = newSize;
                canvas.height = newSize;
            }
        }

        window.addEventListener('resize', handleResize);
        
        // Initial resize to ensure correct dimensions
        handleResize();

        // =====================================================================
        // Pause/Play State
        // =====================================================================
        
        let isPaused = false;
        let pausedNormalizedTime = 0;
        const pausePlayBtn = document.getElementById('pause-play-btn');
        
        function setPaused(paused) {
            if (paused && !isPaused) {
                // Capture the current normalized time when pausing
                const elapsedSeconds = (performance.now() - renderer._loopStartTime) / 1000;
                pausedNormalizedTime = (elapsedSeconds % renderer._loopDuration) / renderer._loopDuration;
            } else if (!paused && isPaused) {
                // When resuming, adjust loopStartTime so time continues from where we paused
                const now = performance.now();
                const pausedElapsedSeconds = pausedNormalizedTime * renderer._loopDuration;
                renderer._loopStartTime = now - (pausedElapsedSeconds * 1000);
            }
            isPaused = paused;
            pausePlayBtn.textContent = paused ? 'play' : 'pause';
            pausePlayBtn.classList.toggle('active', paused);
            if (paused) {
                renderer.stop();
            } else {
                renderer.start();
            }
        }
        
        pausePlayBtn.addEventListener('click', () => {
            setPaused(!isPaused);
        });
        
        // Render a single frame when controls change while paused
        function renderSingleFrameIfPaused() {
            if (isPaused && renderer.pipeline) {
                // Use the fixed paused time
                renderer.render(pausedNormalizedTime);
            }
        }

        const ui = new UIController(renderer, {
            effectSelect,
            dslEditor,
            controlsContainer: effectControlsContainer,
            statusEl,
            fpsCounterEl,
            loadingDialog,
            loadingDialogTitle,
            loadingDialogStatus,
            loadingDialogProgress,
            onControlChange: renderSingleFrameIfPaused,
            onRequestRecompile: () => rebuildPipelineFromDsl({ rebuildControls: false })
        });

        // =====================================================================
        // Test Harness Globals
        // =====================================================================
        
        window.__noisemakerCurrentBackend = () => renderer.backend;
        window.__noisemakerRenderingPipeline = null; // Updated when pipeline changes
        window.__noisemakerCurrentEffect = null; // Updated when effect changes
        window.__noisemakerFrameCount = 0;
        window.__noisemakerGetEffectParams = () => ui.effectParameterValues;
        window.__noisemakerRegenerateDsl = () => ui.regenerateDslFromEffectParams();
        window.__noisemakerCurrentDsl = '';
        window.__noisemakerGetLoopDuration = () => renderer.loopDuration;
        window.__noisemakerGetFPS = () => renderer.currentFPS;
        window.__noisemakerRegistry = { getEffect };
        
        // Expose renderer for test harness (pause, render single frame, etc.)
        window.__noisemakerCanvasRenderer = renderer;
        
        // Expose pause/play controls for test harness
        window.__noisemakerSetPaused = (paused) => setPaused(paused);
        window.__noisemakerIsPaused = () => isPaused;
        window.__noisemakerSetPausedTime = (t) => { pausedNormalizedTime = t; };
        window.__noisemakerGetCanvas = () => renderer.canvas;

        // Sync frame count from renderer
        const originalOnFrame = renderer._onFrame;
        renderer._onFrame = (frameCount) => {
            window.__noisemakerFrameCount = frameCount;
            if (originalOnFrame) originalOnFrame(frameCount);
        };

        // =====================================================================
        // Effect Loading and Selection
        // =====================================================================

        /**
         * Load effect placeholders from manifest (lazy loading)
         */
        async function loadEffects() {
            const effectDirs = [
                { namespace: 'render' },
                { namespace: 'points' },
                { namespace: 'filter' },
                { namespace: 'filter3d' },
                { namespace: 'mixer' },
                { namespace: 'synth' },
                { namespace: 'synth3d' },
                { namespace: 'classicNoisedeck' },
                { namespace: 'classicNoisemaker' }
            ];

            await renderer.loadManifest();
            
            const effects = [];
            for (const dir of effectDirs) {
                const effectNames = renderer.getEffectsFromManifest(dir.namespace);
                for (const effectName of effectNames) {
                    const effectId = `${dir.namespace}/${effectName}`;
                    effects.push({
                        namespace: dir.namespace,
                        name: effectName,
                        description: renderer.getEffectDescription(effectId),
                        instance: null,
                        loaded: false
                    });
                }
            }

            return effects;
        }

        /**
         * Load effects on demand with UI feedback
         */
        async function loadEffectsOnDemand(effectIds) {
            if (effectIds.length === 0) return [];
            
            const needsLoading = effectIds.filter(id => !renderer.loadedEffects.has(id));
            
            if (needsLoading.length === 0) {
                return effectIds.map(id => renderer.loadedEffects.get(id));
            }
            
            ui.showLoadingDialog(
                needsLoading.length === 1 
                    ? `loading ${needsLoading[0]}...` 
                    : `loading ${needsLoading.length} effects...`
            );
            
            try {
                const results = await renderer.loadEffects(effectIds, {
                    onProgress: ({ effectId, stage, status }) => {
                        // Bundle mode: single import with shaders inlined
                        if (stage === 'bundle' && status === 'loading') {
                            ui.addToLoadingQueue(`bundle-${effectId}`, `${effectId}.js`);
                            ui.updateLoadingQueueItem(`bundle-${effectId}`, 'loading');
                        } else if (stage === 'bundle' && status === 'done') {
                            ui.updateLoadingQueueItem(`bundle-${effectId}`, 'done');
                        }
                        // Hot-load mode: separate definition and shader fetches
                        else if (stage === 'definition' && status === 'loading') {
                            ui.addToLoadingQueue(`def-${effectId}`, `${effectId}/definition.js`);
                            ui.updateLoadingQueueItem(`def-${effectId}`, 'loading');
                        } else if (stage === 'definition' && status === 'done') {
                            ui.updateLoadingQueueItem(`def-${effectId}`, 'done');
                            ui.addToLoadingQueue(`shaders-${effectId}`, `${effectId}/shaders`);
                            ui.updateLoadingQueueItem(`shaders-${effectId}`, 'loading');
                        } else if (stage === 'shaders' && status === 'done') {
                            ui.updateLoadingQueueItem(`shaders-${effectId}`, 'done');
                        } else if (status === 'error') {
                            const queueItem = [`bundle-${effectId}`, `def-${effectId}`, `shaders-${effectId}`]
                                .find(id => ui._loadingState.queue.find(i => i.id === id && i.status === 'loading'));
                            if (queueItem) {
                                ui.updateLoadingQueueItem(queueItem, 'error');
                            }
                        }
                    }
                });
                
                ui.updateLoadingStatus('compiling shaders...');
                return results;
            } finally {
                ui.hideLoadingDialog();
            }
        }

        /**
         * Select and load an effect
         */
        async function selectEffect(effectPath, allEffects) {
            const [namespace, name] = effectPath.split('/');
            
            const placeholderEntry = allEffects.find(e => e.namespace === namespace && e.name === name);
            
            if (!placeholderEntry) {
                ui.showStatus(`effect ${namespace}/${name} not found`, 'error');
                return;
            }

            const effectId = `${namespace}/${name}`;
            let effect;
            
            try {
                const loadedEffectsList = await loadEffectsOnDemand([effectId]);
                effect = loadedEffectsList[0];
                
                if (!effect) {
                    ui.showStatus(`failed to load effect ${effectId}`, 'error');
                    return;
                }
                
                placeholderEntry.instance = effect.instance;
                placeholderEntry.loaded = true;
            } catch (err) {
                console.error(`Failed to load effect ${effectId}:`, err);
                ui.showStatus(`failed to load effect ${effectId}: ${err.message}`, 'error');
                return;
            }

            renderer.currentEffect = placeholderEntry;
            window.__noisemakerCurrentEffect = placeholderEntry;
            
            ui.initParameterValues(placeholderEntry);
            
            ui.showStatus(`selected ${namespace}/${name}`, 'success');
            
            await renderer.dispose({ loseContext: false, resetCanvas: false });
            
            await rebuildPipeline();
        }

        // =====================================================================
        // Pipeline Building
        // =====================================================================

        /**
         * Rebuild pipeline from current effect
         */
        async function rebuildPipeline({ silent = false } = {}) {
            const currentEffect = renderer.currentEffect;
            if (!currentEffect) {
                return;
            }

            const dsl = ui.buildDslSource(currentEffect);
            renderer.currentDsl = dsl;
            window.__noisemakerCurrentDsl = dsl;
            
            console.log('DSL', currentEffect.namespace + '/' + currentEffect.name, '\n' + dsl);

            ui.setDsl(dsl);

            // Load any dependencies in the DSL
            const effectsInDsl = extractEffectNamesFromDsl(dsl, renderer.manifest);
            const effectIdsToLoad = effectsInDsl
                .map(e => e.effectId)
                .filter(id => !renderer.loadedEffects.has(id) && renderer.manifest[id]);
            
            if (effectIdsToLoad.length > 0) {
                try {
                    await loadEffectsOnDemand(effectIdsToLoad);
                } catch (err) {
                    console.error('Failed to load effects for pipeline:', err);
                    ui.showStatus(`failed to load effects: ${err.message}`, 'error');
                    return;
                }
            }

            const zoomValue = ui.getZoomValue(currentEffect);

            try {
                await renderer.compile(dsl, { zoom: zoomValue });
                
                window.__noisemakerRenderingPipeline = renderer.pipeline;

                renderer.buildUniformBindings(currentEffect);
                renderer.applyParameterValues(currentEffect, ui.parameterValues);
                
                ui.loadDslAndCreateControls(dsl);

                if (!silent) {
                    ui.showStatus(`compiled ${currentEffect.name}`, 'success');
                }
            } catch (err) {
                console.error(err);
                ui.showStatus(`compilation failed: ${ui.formatCompilationError(err)}`, 'error');
            }
        }

        /**
         * Rebuild pipeline from DSL editor content
         */
        async function rebuildPipelineFromDsl({ rebuildControls = true } = {}) {
            const dsl = ui.getDsl();
            if (!dsl) {
                ui.showStatus('DSL is empty', 'error');
                return;
            }

            // Clear shader overrides when explicitly rebuilding from DSL
            ui.clearShaderOverrides();

            renderer.currentDsl = dsl;
            window.__noisemakerCurrentDsl = dsl;

            // Load any dependencies in the DSL
            const effectsInDsl = extractEffectNamesFromDsl(dsl, renderer.manifest);
            const effectIdsToLoad = effectsInDsl
                .map(e => e.effectId)
                .filter(id => !renderer.loadedEffects.has(id) && renderer.manifest[id]);
            
            if (effectIdsToLoad.length > 0) {
                try {
                    await loadEffectsOnDemand(effectIdsToLoad);
                } catch (err) {
                    console.error('Failed to load effects for DSL:', err);
                    ui.showStatus(`failed to load effects: ${err.message}`, 'error');
                    return;
                }
            }

            const zoomValue = ui.getZoomValue(renderer.currentEffect);

            try {
                await renderer.compile(dsl, { zoom: zoomValue });
                
                window.__noisemakerRenderingPipeline = renderer.pipeline;
                
                if (rebuildControls) {
                    // Try to sync values to existing controls first
                    // Only rebuild if structure changed
                    if (!ui.checkStructureAndApplyState(dsl)) {
                        ui.loadDslAndCreateControls(dsl);
                    }
                }
                
                // ALWAYS apply stored parameter values after compile
                // This ensures slider values persist across recompiles
                if (renderer.applyStepParameterValues) {
                    renderer.applyStepParameterValues(ui.effectParameterValues);
                }
                
                ui.showStatus('compiled successfully', 'success');
            } catch (err) {
                console.error('DSL compilation error:', err);
                ui.showStatus(`compilation failed: ${ui.formatCompilationError(err)}`, 'error');
            }
        }

        // =====================================================================
        // Event Handlers
        // =====================================================================

        // Backend selector
        document.querySelectorAll('input[name="backend"]').forEach(radio => {
            radio.addEventListener('change', async (e) => {
                const nextBackend = e.target.value;
                const currentBackend = renderer.backend;
                
                if (nextBackend === currentBackend) {
                    return;
                }

                await renderer.switchBackend(nextBackend);
                
                // Update canvas reference after reset
                canvas = document.getElementById('canvas');
                renderer._canvas = canvas;

                ui.showStatus(`switched to ${renderer.backend}`, 'success');
                
                const dsl = ui.getDsl();
                if (dsl) {
                    await rebuildPipelineFromDsl({ rebuildControls: false });
                } else if (renderer.currentEffect) {
                    await rebuildPipeline({ silent: true });
                }
            });
        });

        // Duration input
        document.getElementById('duration-input').addEventListener('change', (e) => {
            const newDuration = parseFloat(e.target.value);
            if (newDuration >= 1 && newDuration <= 300) {
                renderer.setLoopDuration(newDuration);
                ui.showStatus(`duration set to ${newDuration}s`, 'success');
            }
        });

        // DSL run button
        dslRunBtn.addEventListener('click', async () => {
            await rebuildPipelineFromDsl();
        });

        // Pipeline code button toggle
        const pipelineCodeBtn = document.getElementById('pipeline-code-btn');
        const dslEditorSection = document.getElementById('dsl-editor-section');
        pipelineCodeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const isVisible = dslEditorSection.style.display !== 'none';
            dslEditorSection.style.display = isVisible ? 'none' : 'block';
            pipelineCodeBtn.classList.toggle('active', !isVisible);
        });

        // DSL editor keyboard shortcut (Ctrl+Enter or Cmd+Enter to run)
        dslEditor.addEventListener('keydown', async (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                await rebuildPipelineFromDsl();
            }
        });

        // Effect selector
        let allLoadedEffects = [];
        effectSelect.addEventListener('change', async (e) => {
            // Support both custom element (detail.value) and native select (target.value)
            const value = e.detail?.value ?? e.target.value;
            await selectEffect(value, allLoadedEffects);
        });

        // =====================================================================
        // Initialization
        // =====================================================================

        async function init() {
            try {
                const effects = await loadEffects();
                
                allLoadedEffects = effects;
                ui.populateEffectSelector(effects);
                
                loadingEl.style.display = 'none';
                appEl.style.display = 'block';

                // Check for backend in URL
                const urlBackend = getBackendFromURL();
                if (urlBackend === 'wgsl' || urlBackend === 'glsl') {
                    if (urlBackend === 'wgsl') {
                        await renderer.switchBackend('wgsl');
                    }
                    const radio = document.querySelector(`input[name="backend"][value="${urlBackend}"]`);
                    if (radio) radio.checked = true;
                }

                // Check for effect in URL
                const urlEffect = getEffectFromURL();
                let selectedEffect = null;

                if (urlEffect) {
                    const [namespace, name] = urlEffect.split('/');
                    const effect = effects.find(e => e.namespace === namespace && e.name === name);
                    
                    if (effect) {
                        selectedEffect = urlEffect;
                        ui.setSelectedEffect(urlEffect);
                    } else {
                        console.warn(`Effect "${urlEffect}" from URL not found`);
                    }
                }

                // Select effect (from URL or first available)
                if (!selectedEffect && effects.length > 0) {
                    selectedEffect = effectSelect.value || `${effects[0].namespace}/${effects[0].name}`;
                }

                if (selectedEffect) {
                    await selectEffect(selectedEffect, effects);
                }
                
                // Start the render loop
                renderer.start();
                
                ui.showStatus('pipeline loaded successfully', 'success');
            } catch (err) {
                console.error('Initialization failed:', err);
                loadingEl.textContent = `error: ${err.message}`;
                loadingEl.style.color = '#d44';
            }
        }

        init();
    </script>
</body>
</html>
